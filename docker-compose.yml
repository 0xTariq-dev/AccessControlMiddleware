version: '3.9'

# Docker Compose configuration for Access Control Middleware
# Includes: Vault, PostgreSQL, Redis, Nginx reverse proxy, and Middleware app
#
# Usage:
#   docker-compose up -d              # Start all services in background
#   docker-compose logs -f middleware  # View middleware logs
#   docker-compose down                # Stop and remove containers
#
# Production Notes:
#   - Set all environment variables in .env before production deployment
#   - Configure SSL certificates for HTTPS (Nginx)
#   - Use external PostgreSQL for multi-instance deployments
#   - Monitor Redis memory usage on high-traffic systems
#   - Set up Vault backup/recovery procedures

services:
  # HashiCorp Vault - Secret Management
  # Stores sensitive data: device credentials, database passwords, API keys
  # Data persisted in ./vault-data volume
  vault:
    image: hashicorp/vault:1.15.2
    container_name: access-control-vault
    restart: unless-stopped
    ports:
      - "8200:8200"  # Vault API
    environment:
      VAULT_ADDR: http://0.0.0.0:8200
      SKIP_SETCAP: "true"
    volumes:
      - vault-data:/vault/file
      - vault-logs:/vault/logs
      - ./deploy/vault/vault-config.hcl:/vault/config/vault-config.hcl:ro
    cap_add:
      - IPC_LOCK
    entrypoint: []
    command: ["vault", "server", "-config=/vault/config/vault-config.hcl"]
    networks:
      - access-control-network
    healthcheck:
      test: ["CMD", "sh", "-c", "vault status -address=http://127.0.0.1:8200 || exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # PostgreSQL Database (Production)
  # SQLite used in-container for development; use external PostgreSQL for production
  # Changelog: Configured with standard production security practices
  postgres:
    image: postgres:16-alpine
    container_name: access-control-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"  # Internal only in production via pgBouncer
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-acm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-access_control}
      POSTGRES_INITDB_ARGS: "-c shared_buffers=256MB -c max_connections=100"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - postgres-logs:/var/log/postgresql
    networks:
      - access-control-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-acm_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Redis - Distributed Caching & Locking
  # Primary queue mechanism; fallback to SQLite if unavailable
  # Stores: session locks, rate limiting counters, temporary queue entries
  redis:
    image: redis:7-alpine
    container_name: access-control-redis
    restart: unless-stopped
    ports:
      - "6379:6379"  # Redis protocol
    command:
      - redis-server
      - "--appendonly"
      - "yes"  # Enable AOF persistence
      - "--maxmemory"
      - "512mb"  # Limit memory (adjust based on workload)
      - "--maxmemory-policy"
      - "allkeys-lru"  # Evict oldest entries when full
    volumes:
      - redis-data:/data
    networks:
      - access-control-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Nginx Reverse Proxy
  # TLS termination, load balancing, rate limiting
  # Production: Add SSL certificates and configure for external traffic
  nginx:
    image: nginx:alpine
    container_name: access-control-nginx
    restart: unless-stopped
    ports:
      - "80:80"        # HTTP
      # - "443:443"   # HTTPS (uncomment when SSL configured)
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx
      # - ./ssl:/etc/nginx/ssl:ro  # SSL certificates (production)
    depends_on:
      - middleware
    networks:
      - access-control-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Database Initialization Service
  # Runs migrations before middleware starts
  # Ensures schema is up-to-date; idempotent (safe if run multiple times)
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: access-control-migrate-init
    profiles: ["init"]  # Run with: docker-compose --profile init up migrate
    working_dir: /app
    depends_on:
      vault:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-acm_user}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-access_control}
      DATABASE_TYPE: postgresql
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-}
      VAULT_ENABLED: ${VAULT_ENABLED:-false}
      PYTHONPATH: /app
    env_file:
      - .env
    volumes:
      - ./app:/app/app:ro
      - ./migrations:/app/migrations:ro
      - middleware-data:/app/data
    networks:
      - access-control-network
    command: ["python", "-m", "app.cli", "migrate"]
    restart: "no"  # Don't restart after migration completes

  # Access Control Middleware Application
  # FastAPI service handling device integrations, event processing, API
  middleware:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: access-control-middleware
    restart: unless-stopped
    expose:
      - "8000"  # Internal only; access via Nginx
    depends_on:
      vault:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      # Database configuration
      DATABASE_URL: postgres://${POSTGRES_USER:-acm_user}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-access_control}
      
      # FastAPI configuration
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      
      # Vault configuration
      VAULT_ADDR: http://vault:8200
      VAULT_ENABLED: ${VAULT_ENABLED:-true}
      VAULT_TOKEN: ${VAULT_TOKEN:-}  # Set via .env before production
      VAULT_SKIP_VERIFY: "false"
      
      # Redis configuration
      REDIS_URL: redis://redis:6379/0
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      
      # Device mode: 'mock' for demo, 'isapi' for production
      DEVICE_MODE: ${DEVICE_MODE:-mock}
      
      # Python environment
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
    env_file:
      - .env
    volumes:
      # Mount local code for development
      - ./app:/app/app:ro
      - ./migrations:/app/migrations:ro
      # Persistent storage
      - middleware-logs:/app/logs
      - middleware-data:/app/data
    networks:
      - access-control-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Migration/Admin Helper Service (optional)
  # Use with: docker-compose run --rm --profile tools migration migrate
  #           docker-compose run --rm --profile tools migration status
  #           docker-compose run --rm --profile tools migration rollback
  # Profile: tools (use --profile tools to include this service)
  migration:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: access-control-migration-helper
    profiles: ["tools"]  # Activate with: docker-compose --profile tools ...
    working_dir: /app
    depends_on:
      vault:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-acm_user}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-access_control}
      DATABASE_TYPE: postgresql
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-}
      VAULT_ENABLED: ${VAULT_ENABLED:-false}  # Disable for local migrations (uses DB creds)
      PYTHONPATH: /app
      PYTHONUNBUFFERED: 1
    env_file:
      - .env
    volumes:
      - ./app:/app/app:ro
      - ./migrations:/app/migrations:ro
      - middleware-data:/app/data
    networks:
      - access-control-network
    # Default command (show status); override via docker-compose run ... <command>
    # Examples:
    #   docker-compose run migration migrate        # Apply pending migrations
    #   docker-compose run migration status         # Show migration status
    #   docker-compose run migration rollback       # Rollback last migration
    #   docker-compose run migration init           # Initialize migrations directory
    command: ["python", "-m", "app.cli", "status"]
    stdin_open: true
    tty: true

# Docker Networks
networks:
  access-control-network:
    driver: bridge

# Docker Volumes (persistent storage)
volumes:
  vault-data:
    driver: local
  vault-logs:
    driver: local
  postgres-data:
    driver: local
  postgres-logs:
    driver: local
  redis-data:
    driver: local
  nginx-logs:
    driver: local
  middleware-logs:
    driver: local
  middleware-data:
    driver: local

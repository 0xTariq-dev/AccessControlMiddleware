# Nginx configuration for Access Control Middleware
# Optimized for FastAPI reverse proxy with proper headers and security

# Worker processes (auto = number of CPU cores)
worker_processes auto;

# Error logging
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;  # Efficient connection processing on Linux
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format with timing information
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;  # Allow larger request bodies (QR codes, configs)

    # Gzip compression for text responses
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml application/atom+xml image/svg+xml;

    # Security headers (applied to all responses)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Hide nginx version
    server_tokens off;

    # Upstream FastAPI backend
    upstream fastapi_backend {
        server middleware:8001;
        keepalive 32;  # Keep connections alive for performance
    }

    # HTTP Server (Port 80)
    server {
        listen 80;
        listen [::]:80;
        server_name _;  # Replace with your domain in production

        # # Redirect HTTP to HTTPS (uncomment when SSL is ready)
        # return 301 https://$server_name$request_uri;

        # Root location - proxy to FastAPI
        location / {
            # Proxy settings
            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;
            
            # WebSocket support (if needed for real-time events)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Forward original client information
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Timeouts (adjust based on device response times)
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;  # ISAPI calls can be slow
            
            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
            
            # Don't proxy redirects as-is
            proxy_redirect off;
        }

        # Health check endpoint (direct, no caching)
        location /health {
            proxy_pass http://fastapi_backend/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            access_log off;  # Don't log health checks
            
            # No caching for health checks
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # Static content caching (if you add docs/OpenAPI UI later)
        location ~* ^/(docs|redoc|openapi\.json) {
            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # Cache API documentation for 1 hour
            proxy_cache_valid 200 1h;
            add_header Cache-Control "public, max-age=3600";
        }

        # Rate limiting for sensitive endpoints (optional)
        # Uncomment and configure per your needs
        # location /api/devices {
        #     limit_req zone=api_limit burst=10 nodelay;
        #     proxy_pass http://fastapi_backend;
        #     # ... (same proxy settings as above)
        # }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # # HTTPS Server (Port 443) - Uncomment when ready for SSL
    # server {
    #     listen 443 ssl http2;
    #     listen [::]:443 ssl http2;
    #     server_name _;  # Replace with your domain
    #
    #     # SSL certificates (use Let's Encrypt or your own certs)
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #
    #     # Enable HSTS (HTTP Strict Transport Security)
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    #
    #     # Same server block as HTTP above
    #     location / { ... }
    # }
}
